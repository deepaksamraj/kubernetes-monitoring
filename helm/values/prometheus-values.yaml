grafana:
  enabled: true
  adminPassword: "admin123"
  service:
    type: NodePort

prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorNamespaceSelector: {}
    serviceMonitorSelector: {}

    additionalPrometheusRules:
    - name: flask-alerts
      groups:
      - name: flask.rules
        rules:
        - alert: HighErrorRate
          expr: rate(flask_http_request_total{status="500"}[5m]) > 0.1
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "High error rate on Flask app"
            description: "More than 10% of requests are returning 500 errors"

alertmanager:
  enabled: true